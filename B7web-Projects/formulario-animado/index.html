<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <script src="assets/javaScript/script.js" defer></script>
  </head>
  <body class="bodyForm">
    <div class="mainContainer">
      <div class="card loginActive">
        <!-- left side -->
        <div class="leftSide">
          <!-- Form Login -->
          <div class="formlogin">
            <h2>Fazer Login</h2>
            <form action="">
              <input type="email"  placeholder="E-mail" />
              <input type="password"  placeholder="Senha" />
              <button type="submit" class="enterButton">Entrar</button>
            </form>
          </div>
          <!-- Faça Login -->
          <div class="facaLogin">
            <h2>Já tem <br />uma conta?</h2>
            <p>
              Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut
              ullamcorper.
            </p>
            <button type="submit" class="loginButton">Faça Login</button>
          </div>
        </div>
        <!-- Right side -->
        <div class="righSide">
          <!-- Form Cadastro -->
          <div class="formCadastro">
            <h2>Cadastro</h2>
            <form action="">
              <input type="text" id="name" placeholder="nome">
              <input type="email"  placeholder="E-mail">
              <input type="password"  placeholder="Senha">
              <input type="password" id="checkPassword" placeholder="Confirme a senha">
              <button type="submit" class="cadastrar">Cadastrar</button>
            </form>
          </div>
          <!-- Cadastrar -->
          <div class="facaCadastro">
            <h2>Não tem <br>uma conta?</h2>
            <p>
              Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut
              ullamcorper.
            </p>
            <button type="submit" class="cadastroButton">Cadastre-se</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
